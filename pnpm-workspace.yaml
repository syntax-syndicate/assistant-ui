packages:
  - packages/*
  - examples/*
  - apps/*
  - templates/*

ignoredBuiltDependencies:
  - '@clerk/shared'
  - '@google/genai'
  - '@modelcontextprotocol/ext-apps'
  - '@mongodb-js/zstd'
  - core-js
  - node-liblzma
  - protobufjs

onlyBuiltDependencies:
  - esbuild@0.25.12
  - esbuild@0.27.7
  - esbuild@0.28.0
  - sharp@0.34.5
  - sqlite3@5.1.7

strictDepBuilds: true

verifyDepsBeforeRun: install

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@assistant-ui/*'
  - assistant-cloud
  - assistant-stream
  - assistant-ui
  - create-assistant-ui
  - heat-graph
  - mcp-app-studio
  - safe-content-frame
  - tw-glass
  - tw-shimmer
