name: API Surface

on:
  push:
    branches: [main]
    paths:
      - "api-surface/**"
      - "packages/**"
      - "scripts/generate-api-surface.mjs"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/api-surface.yaml"
  pull_request:
    branches: [main]
    paths:
      - "api-surface/**"
      - "packages/**"
      - "scripts/generate-api-surface.mjs"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/api-surface.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api-surface:
    name: Verify API Surface
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Force fresh dist declarations so snapshot checks cannot use stale turbo outputs.
        run: pnpm api-surface:build

      - name: Verify API surface snapshots
        run: pnpm api-surface:check
